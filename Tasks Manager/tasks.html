<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "tasks.css">
        <title> Task Manager </title>
    </head>
    <body>
        <div class="task-container">
            <h1> My Tasks </h1>

            <!-- Input Section-->
            <div class="task-form">
                <input type="text" id="task-input" placeholder="Add a new task...">
                <button id="add-btn"> Add Task </button>
            </div>

            <!-- Dynamic task list-->
            <ul id="task-list"> </ul>
        </div>                

        <script src="tasks.js"> </script>
    </body>
    </html>
