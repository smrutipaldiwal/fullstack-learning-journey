<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "register.css">
    </head>
    <body> 
        <div class="register-container">
                <form id="registerForm">
                <h1> Register </h1>

                <div class="input-group">
                    <label for="username"> Full Name: </label>
                    <input type="text" id="username" name="username" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email"> Email: </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <div class="password-container">
                        <label for="password"> Password: </label>
                        <input type="password" id="password" minlength=6 name="password" placeholder="Enter your password" required>
                        <i class="fa fa-eye" id="togglePassword"></i>

                        <div class="strength-bar-conatiner">
                            <div id="strength-bar"> </div>
                        </div>
                        <p id="strength-text"> </p>
                    </div>
                </div>

                <div class="input-group">
                    <div class="password-container">
                        <label for="confirm_password"> Confirm Password: </label>
                        <input type="password" id="confirm_password" minlength=6 name="confirm_password" placeholder="Confirm your password" required>
                        <i class="fa fa-eye" id="toggleConfirmPassword"></i>
                        <p id="validationMessage" class="message" style="display:none;"> Passwords do not match </p>
                    </div>
                </div>

            <button type="submit" id="submitBtn"> Register </button>

            <div class="links">
                <p> Already have an account? <a href="C:\Users\smrut\OneDrive\Desktop\My Fullstack Project\Login Page\login.html"> Login here </a> </p>
            </div>
        </form>
        <script src="register.js"> </script>
    </body>
</html>
